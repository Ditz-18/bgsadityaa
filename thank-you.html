<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesan Terkirim - Terima Kasih</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1a35 100%);
        color: #e8eaf0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .success-container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
        animation: fadeIn 0.8s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .success-icon {
        font-size: 6rem;
        margin-bottom: 2rem;
        animation: bounce 1s ease;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 3rem;
        font-weight: 900;
        background: linear-gradient(135deg, #00f5ff, #ff00e5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.2rem;
        color: #a8b2d1;
        margin-bottom: 2rem;
        line-height: 1.8;
      }

      .countdown {
        font-size: 1rem;
        color: #00f5ff;
        margin-bottom: 2rem;
      }

      .countdown span {
        font-size: 2rem;
        font-weight: 700;
        font-family: "Orbitron", sans-serif;
      }

      .btn {
        padding: 1rem 2.5rem;
        background: linear-gradient(135deg, #00f5ff, #ff00e5);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
        box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(0, 245, 255, 0.5);
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .success-icon {
          font-size: 4rem;
        }

        p {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="success-container">
      <div class="success-icon"></div>
      <h1>Pesan Terkirim!</h1>
      <p>
        Terima kasih telah menghubungi saya.<br />
        Saya akan segera membalas pesan Anda melalui email.
      </p>
      <div class="countdown">
        Kembali ke halaman utama dalam <span id="countdown">5</span> detik...
      </div>
      <a href="index.html" class="btn">Kembali Sekarang</a>
    </div>

    <script>
      // Countdown redirect
      let count = 5;
      const countdownElement = document.getElementById("countdown");

      const interval = setInterval(() => {
        count--;
        countdownElement.textContent = count;

        if (count <= 0) {
          clearInterval(interval);
          window.location.href = "index.html";
        }
      }, 1000);
    </script>
  </body>
</html>
